<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>JE Labs — Strategic Growth Partner</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent}

/* Viewport: fills screen above nav bar */
#vp{
  position:fixed;top:0;left:0;right:0;bottom:48px;
  display:flex;align-items:center;justify-content:center;
  background:#000;overflow:hidden;
}

/* Wrapper: fixed slide dimensions, scaled via CSS transform */
#wr{
  width:1280px;height:720px;
  position:relative;
  transform-origin:center center;
  /* scale set by JS */
}

/* Each slide */
.slide{
  position:absolute;inset:0;
  width:1280px;height:720px;
  opacity:0;pointer-events:none;
  transition:opacity 0.4s ease;
  overflow:hidden;background:#000;
}
.slide.active{opacity:1;pointer-events:auto;z-index:10}

/* iframe inside slide — fill exactly */
.slide iframe{
  width:1280px;height:720px;
  border:none;display:block;
  pointer-events:auto;
  background:#000;
}

/* Progress bar */
#pb{position:fixed;top:0;left:0;right:0;height:3px;background:#111;z-index:9999}
#pf{height:100%;background:#00F5B8;transition:width 0.4s ease;box-shadow:0 0 8px rgba(0,245,184,0.5)}

/* Nav bar — compact for mobile */
#nav{
  position:fixed;bottom:0;left:0;right:0;height:48px;
  background:rgba(0,0,0,0.95);backdrop-filter:blur(12px);
  border-top:1px solid #222;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;z-index:9999;
  gap:8px;
}
.nb{
  background:none;border:1px solid #333;color:#888;
  padding:6px 12px;cursor:pointer;font-size:11px;
  font-family:monospace;letter-spacing:0.04em;
  transition:all 0.2s;border-radius:4px;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.nb:hover,.nb:active{border-color:#00F5B8;color:#00F5B8}
.nb:disabled{opacity:0.2;cursor:default}

#ct{color:#666;font-family:monospace;font-size:12px;letter-spacing:0.08em;min-width:55px;text-align:center}
#ct span{color:#00F5B8}

#dt{display:flex;gap:4px;align-items:center;flex-shrink:1;overflow:hidden}
.dot{
  width:6px;height:6px;border-radius:50%;background:#333;
  cursor:pointer;transition:all 0.25s;border:none;padding:0;
  flex-shrink:0;-webkit-tap-highlight-color:transparent;
}
.dot.on{background:#00F5B8;box-shadow:0 0 6px rgba(0,245,184,0.6);transform:scale(1.5)}
.dot:hover{background:#555}

#fs{
  background:none;border:1px solid #333;color:#666;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:4px;transition:all 0.2s;font-size:12px;
  flex-shrink:0;-webkit-tap-highlight-color:transparent;
}
#fs:hover,#fs:active{border-color:#00F5B8;color:#00F5B8}

/* Mobile: hide dots on small screens, smaller nav */
@media(max-width:768px){
  #dt{display:none}
  .nb{padding:5px 10px;font-size:10px}
  #nav{height:44px;padding:0 8px}
  #vp{bottom:44px}
  #ct{font-size:11px}
}

/* Very small screens */
@media(max-width:400px){
  .nb{padding:4px 8px;font-size:9px}
}
</style>
</head>
<body>

<div id="pb"><div id="pf" style="width:0%"></div></div>

<div id="vp">
  <div id="wr">
    <!-- slides injected by JS -->
  </div>
</div>

<div id="nav">
  <button class="nb" id="pv" disabled><i class="fa-solid fa-arrow-left"></i> PREV</button>
  <div id="dt"></div>
  <div id="ct"><span>1</span> / 20</div>
  <button class="nb" id="nx">NEXT <i class="fa-solid fa-arrow-right"></i></button>
  <button id="fs" title="Fullscreen"><i class="fa-solid fa-expand"></i></button>
</div>

<script>
const T=20;
let c=0;

// Create slide iframes dynamically
const wr=document.getElementById('wr');
for(let i=0;i<T;i++){
  const div=document.createElement('div');
  div.className='slide'+(i===0?' active':'');
  div.id='s'+i;
  const iframe=document.createElement('iframe');
  iframe.src='slides/slide-'+i+'.html';
  iframe.setAttribute('loading', i<3 ? 'eager' : 'lazy'); // lazy load non-visible slides
  iframe.setAttribute('scrolling','no');
  div.appendChild(iframe);
  wr.appendChild(div);
}

// Navigation
function go(n){
  if(n<0||n>=T||n===c)return;
  document.querySelectorAll('.slide')[c].classList.remove('active');
  document.querySelectorAll('.slide')[n].classList.add('active');
  c=n;
  ui();
}

function ui(){
  document.getElementById('ct').innerHTML='<span>'+(c+1)+'</span> / '+T;
  document.getElementById('pf').style.width=(c/(T-1)*100)+'%';
  document.getElementById('pv').disabled=c===0;
  document.getElementById('nx').disabled=c===T-1;
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===c));
}

// Dots
(function(){
  const el=document.getElementById('dt');
  for(let i=0;i<T;i++){
    const d=document.createElement('button');
    d.className='dot'+(i===0?' on':'');
    d.onclick=()=>go(i);
    el.appendChild(d);
  }
})();

// Buttons
document.getElementById('pv').onclick=()=>go(c-1);
document.getElementById('nx').onclick=()=>go(c+1);

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' '){e.preventDefault();go(c+1)}
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();go(c-1)}
  else if(e.key==='Home')go(0);
  else if(e.key==='End')go(T-1);
  else if(e.key==='f'||e.key==='F')tf();
});

// Iframe keyboard forwarding
window.addEventListener('message',function(e){
  if(e.data==='next')go(c+1);
  else if(e.data==='prev')go(c-1);
});

// Touch/Swipe — works on both viewport and iframes
let tx=0,ty=0,swiping=false;
document.addEventListener('touchstart',e=>{
  tx=e.touches[0].clientX;
  ty=e.touches[0].clientY;
  swiping=true;
},{passive:true});
document.addEventListener('touchend',e=>{
  if(!swiping)return;
  swiping=false;
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  // Only trigger if horizontal swipe is dominant
  if(Math.abs(dx)>50 && Math.abs(dx)>Math.abs(dy)*1.5){
    dx<0 ? go(c+1) : go(c-1);
  }
},{passive:true});

// Click edges to navigate (desktop)
document.getElementById('vp').addEventListener('click',e=>{
  if(e.target.closest('#nav')||e.target.closest('button')||e.target.closest('iframe'))return;
  const x=e.clientX;
  if(x<window.innerWidth*0.25)go(c-1);
  else if(x>window.innerWidth*0.75)go(c+1);
});

// === CRITICAL: Scale to fit viewport ===
function sc(){
  const vp=document.getElementById('vp');
  const vw=vp.clientWidth;
  const vh=vp.clientHeight;
  
  // Calculate scale to fit 1280x720 into viewport
  const scaleX=vw/1280;
  const scaleY=vh/720;
  const scale=Math.min(scaleX,scaleY);
  
  const wrapper=document.getElementById('wr');
  wrapper.style.transform='scale('+scale+')';
  
  // Center the wrapper properly
  const scaledW=1280*scale;
  const scaledH=720*scale;
  const offsetX=(vw-scaledW)/2;
  const offsetY=(vh-scaledH)/2;
  
  wrapper.style.position='absolute';
  wrapper.style.left=offsetX+'px';
  wrapper.style.top=offsetY+'px';
  wrapper.style.transformOrigin='top left';
}

// Run on load and resize
window.addEventListener('resize',sc);
window.addEventListener('orientationchange',()=>setTimeout(sc,200));
sc();
// Re-scale after a brief delay to account for mobile browser chrome
setTimeout(sc,100);
setTimeout(sc,500);

// Fullscreen
function tf(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen();
  }
}
document.getElementById('fs').onclick=tf;
document.addEventListener('fullscreenchange',()=>setTimeout(sc,100));

ui();
</script>
</body>
</html>
